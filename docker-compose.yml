services:
  vm:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor-style-vm:latest
    container_name: cursor-style-vm
    shm_size: "2gb"
    ports:
      - "5901:5901"
      - "6080:6080"
      - "8000:8000"
    environment:
      SCREEN_WIDTH: "1920"
      SCREEN_HEIGHT: "1080"
      SCREEN_DEPTH: "24"
      VNC_PASSWORD: "agent"
    volumes:
      - vm-home:/root
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  vm-home:
    name: cursor-style-vm-home
